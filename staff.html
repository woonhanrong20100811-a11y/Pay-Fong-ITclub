<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格解码站 · 礼品记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #c29f64;
            --bg-dark: #121216;
            --card-bg: #1a1a22;
            --green: #2ecc71;
            --red: #e74c3c;
            --purple: #9b59b6;
            --orange: #e67e22;
        }
        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .staff-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            display: none;
        }
        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            border-bottom: 2px double rgba(194,159,100,0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .counter-box {
            text-align: center;
            background: #0d0d11;
            border: 1px solid rgba(194,159,100,0.15);
            border-radius: 6px;
            padding: 12px 0;
            margin-bottom: 20px;
        }
        .counter-title {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 1px;
        }
        .counter-num {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--green);
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
            margin-top: 4px;
        }

        .stock-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stock-card {
            background: #22222c;
            border: 1px solid rgba(194,159,100,0.2);
            border-radius: 6px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
        }
        .stock-card.active {
            border-color: var(--gold);
            background: rgba(194,159,100,0.1);
            box-shadow: 0 0 10px rgba(194,159,100,0.2);
        }
        .stock-card h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: var(--gold);
        }
        .stock-num {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .day-control-box {
            background: #0d0d11;
            border: 1px solid rgba(194,159,100,0.3);
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
            display: none; 
        }
        .day-control-title {
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        .day-btn-group {
            display: flex;
            gap: 10px;
        }
        .day-btn {
            flex: 1;
            padding: 10px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-weight: bold;
            transition: all 0.2s;
        }
        .day-btn-1.active {
            background: rgba(230, 126, 34, 0.2);
            color: var(--orange);
            border-color: var(--orange);
            box-shadow: 0 0 8px rgba(230, 126, 34, 0.3);
        }
        .day-btn-2.active {
            background: rgba(155, 89, 182, 0.2);
            color: var(--purple);
            border-color: var(--purple);
            box-shadow: 0 0 8px rgba(155, 89, 182, 0.3);
        }

        .scanner-section {
            background: #0d0d11;
            border: 1px dashed rgba(194,159,100,0.4);
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .scan-btn {
            background: #4a0e0e;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 25px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        #reader {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            border-radius: 6px;
            overflow: hidden;
            display: none;
        }

        .manual-input-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed rgba(194,159,100,0.15);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .manual-row {
            display: flex;
            gap: 8px;
        }
        .manual-input {
            flex: 1;
            background: #15151c;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.05rem;
            letter-spacing: 2px;
            text-align: center;
        }
        .manual-input:focus {
            border-color: var(--gold);
            outline: none;
        }
        .manual-btn {
            background: #34495e;
            color: #fff;
            border: 1px solid var(--gold);
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .manual-btn:hover {
            background: #2c3e50;
        }

        .data-panel {
            background: #0d0d11;
            border-left: 4px solid var(--gold);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .data-row:last-child { margin-bottom: 0; }
        .label { color: #888; }
        .val { color: #fff; font-weight: bold; }
        .val.rank-SSR { color: #ff4a4a; text-shadow: 0 0 5px rgba(255,74,74,0.3); }
        .val.rank-SR { color: #ffaa00; }

        .guest-box {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .guest-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .guest-box label {
            font-weight: bold;
            color: var(--red);
            cursor: pointer;
        }
        .guest-box input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .guest-count-input {
            width: 70px;
            background: #222;
            border: 1px solid var(--red);
            color: white;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            font-size: 1rem;
            display: none;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-btn:hover { background: #dfb875; }
        .action-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .history-section {
            margin-top: 30px;
            border-top: 1px dashed rgba(194,159,100,0.3);
            padding-top: 15px;
        }
        .history-title {
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .history-list {
            max-height: 150px;
            overflow-y: auto;
            background: #0d0d11;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="staff-container" id="mainHub">

    <div class="stock-board">
        <div class="stock-card active" id="btn-current-day" onclick="switchPool('current_day')">
            <h3 id="current-day-label">当天常规池 (<span id="env-tag">加载中...</span>)</h3>
            <div class="stock-num" id="stock-current-day">--</div>
        </div>
        <div class="stock-card" id="btn-guest" onclick="switchPool('guest')">
            <h3>特别嘉宾池</h3>
            <div class="stock-num" id="stock-guest">--</div>
        </div>
    </div>

    <div class="day-control-box" id="adminDayControl">
        <div class="day-control-title">🛡️ 更改当前展出状态 (核心管理权限)</div>
        <div class="day-btn-group">
            <button id="day-btn-1" class="day-btn day-btn-1" onclick="cloudSwitchDay('day1')">展出：第一天 (Day 1)</button>
            <button id="day-btn-2" class="day-btn day-btn-2" onclick="cloudSwitchDay('day2')">展出：第二天 (Day 2)</button>
        </div>
    </div>

    <div class="scanner-section">
        <button class="scan-btn" id="startScanBtn" onclick="startCameraScanner()">📷 开启摄像头原地扫码</button>
        <div id="reader"></div>
        
        <div class="manual-input-box">
            <div class="manual-row">
                <input type="text" id="manualUrlInput" class="manual-input" placeholder="直接连打数字(如 11285 或 1128523098)">
                <button class="manual-btn" onclick="processManualInput()">现场核销</button>
            </div>
            <span style="font-size: 0.75rem; color: #aaa; text-align: left; padding-left: 4px;">
               💡 <b>盲打秘籍</b>：段位(1位)+牌号(2位)+识(2/3位)+疾+律。 1-SSR, 2-SR, 3-A, 4-B
            </span>
        </div>
    </div>

    <div class="data-panel">
        <div class="data-row">
            <span class="label">解析状态：</span>
            <span class="val" id="parse-status" style="color:var(--red)">等待云端同步及扫描数据...</span>
        </div>
        <div class="data-row">
            <span class="label">玩家天命段位：</span>
            <span class="val" id="player-rank">-</span>
        </div>
        <div class="data-row">
            <span class="label">灵魂主控命牌：</span>
            <span class="val" id="player-tarot">-</span>
        </div>
        <div class="data-row">
            <span class="label">试炼原始成绩：</span>
            <span class="val" id="player-scores">-</span>
        </div>
    </div>

    <div class="guest-box">
        <div style="display:flex; flex-direction:column;">
            <label for="isGuest">✦ 激活特别嘉宾核销 ✦</label>
            <span style="font-size:0.75rem; color:#aaa; margin-top:3px;">勾选后转入嘉宾通道，支持多发礼品</span>
        </div>
        <div class="guest-control">
            <input type="checkbox" id="isGuest" onchange="toggleGuestMode()">
            <input type="number" id="guestGiftCount" class="guest-count-input" value="1" min="1">
        </div>
    </div>

    <button class="action-btn" id="confirmBtn" onclick="executeVerification()" disabled>确认核销并发放礼品</button>

    <div class="history-section">
        <div class="history-title">🕒 现场成功核销流水 (最新5条)</div>
        <div class="history-list" id="historyList">
            <div style="color:#666; text-align:center; padding:10px;">暂无当前核销记录</div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://eglmalfktjrrvkiolqrd.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_H8C9O523vQl89-h-Y1Mj_A_7DjNCiQy"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function doAuthentication() {

            "2022-107", "2022-351", "2021-109", "2021-122"
        ];
        const superAdmins = ["2021-122", "2021-109", "2023-257", "2022-107"];

        let inputID = prompt("【安全御守】请输入核心工作人员学号以授权访问：");
        if (inputID) {
            inputID = inputID.trim().replace(/\s+/g, ""); 
            
            if (allowedStaff.includes(inputID)) {
                document.getElementById('mainHub').style.display = "block";
                if (superAdmins.includes(inputID)) {
                    document.getElementById('adminDayControl').style.display = "block";
                }
                initSystem();
            } else {
                alert("身份校验失败：该学号不具备当前站点的访问授权！");
                window.location.href = "about:blank";
            }
        } else {
            window.location.href = "about:blank";
        }
    }

    let rawStocks = { day1: 0, day2: 0, guest: 0 }; 
    let currentActiveDayId = 'day1'; 
    let currentPool = 'current_day'; 
    let currentData = null;   
    let html5QrcodeScanner = null; 

    const tarotNames = [
        "愚者", "魔术师", "女祭司", "皇后", "皇帝", "教皇", "恋人", "战车", "力量", "隐者", "命运之轮", "正义", "倒吊人", "死神", "节制", "恶魔", "塔", "星星", "月亮", "太阳", "审判", "世界",
        "权杖 Ace", "权杖二", "权杖三", "权杖四", "权杖五", "权杖六", "权杖七", "权杖八", "权杖九", "权杖十", "权杖侍从", "权杖骑士", "权杖皇后", "权杖国王",
        "圣杯 Ace", "圣杯二", "圣杯三", "圣杯四", "圣杯五", "圣杯六", "圣杯七", "圣杯八", "圣杯九", "圣杯十", "圣杯侍从", "圣杯骑士", "圣杯皇后", "圣杯国王",
        "宝剑 Ace", "宝剑二", "宝剑三", "宝剑四", "宝剑五", "宝剑六", "宝剑七", "宝剑八", "宝剑九", "宝剑十", "宝剑侍从", "宝剑骑士", "宝剑皇后", "宝剑国王",
        "钱币 Ace", "钱币二", "钱币三", "钱币四", "钱币五", "钱币六", "钱币七", "钱币八", "钱币九", "钱币十", "钱币侍从", "钱币骑士", "钱币皇后", "钱币国王"
    ];

    async function initSystem() {
        await fetchConfigFromCloud();
        await fetchStocksFromCloud();
        await fetchTotalScannedCount();
        processParams(window.location.search);
        setupRealtimeListeners();
    }

    async function fetchConfigFromCloud() {
        const { data, error } = await _supabase
            .from('config')
            .select('*')
            .eq('id', 'current_active_day')
            .single();
        if (!error && data) {
            currentActiveDayId = data.value;
            updateDayButtonsUI(data.value);
        }
    }

    async function cloudSwitchDay(targetDayId) {
        const { error } = await _supabase
            .from('config')
            .update({ value: targetDayId })
            .eq('id', 'current_active_day');
        
        if (error) {
            alert("切换失败: " + error.message);
        } else {
            currentActiveDayId = targetDayId;
            updateDayButtonsUI(targetDayId);
            updateStockUI();
        }
    }

    function updateDayButtonsUI(activeDay) {
        const btn1 = document.getElementById('day-btn-1');
        const btn2 = document.getElementById('day-btn-2');
        if (activeDay === 'day1') {
            btn1.classList.add('active');
            btn2.classList.remove('active');
        } else {
            btn2.classList.add('active');
            btn1.classList.remove('active');
        }
    }

    async function fetchStocksFromCloud() {
        const { data, error } = await _supabase.from('stocks').select('*');
        if (error) {
            console.error("无法读取云端库存:", error);
            document.getElementById('parse-status').innerText = "❌ 无法连接到云数据库！";
            return;
        }
        data.forEach(item => { rawStocks[item.id] = item.count; });
        updateStockUI();
        document.getElementById('parse-status').innerText = "📡 云端同步就绪，等待捕获数据...";
        document.getElementById('parse-status').style.color = "var(--gold)";
    }

    async function fetchTotalScannedCount() {
        const { count, error } = await _supabase
            .from('logs')
            .select('*', { count: 'exact', head: true });
        if (!error && count !== null) {
            document.getElementById('total-scanned').innerText = count;
        }
    }

    function updateStockUI() {
        document.getElementById('stock-current-day').innerText = rawStocks[currentActiveDayId] !== undefined ? rawStocks[currentActiveDayId] : '--';
        document.getElementById('stock-guest').innerText = rawStocks.guest !== undefined ? rawStocks.guest : '--';
        document.getElementById('env-tag').innerText = currentActiveDayId === 'day1' ? '第一天·Day 1' : '第二天·Day 2';
    }

    function switchPool(poolName) {
        if(document.getElementById('isGuest').checked) {
            alert("当前正处于【特别嘉宾】模式，系统已强制锁定嘉宾专属池。");
            return;
        }
        currentPool = poolName;
        document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
        if (poolName === 'current_day') {
            document.getElementById('btn-current-day').classList.add('active');
        } else {
            document.getElementById('btn-guest').classList.add('active');
        }
    }

    function startCameraScanner() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = "block";
        document.getElementById('startScanBtn').innerText = "🔄 后置镜头扫描运行中...";

        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5Qrcode("reader");
        }

        const scanConfig = { 
            fps: 15, 
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                const edgeSize = Math.floor(minEdge * 0.75); 
                return { width: edgeSize, height: edgeSize };
            },
            videoConstraints: { facingMode: { exact: "environment" }, maxWidth: 1280, maxHeight: 720 }
        };

        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            scanConfig,
            (qrCodeMessage) => {
                html5QrcodeScanner.stop().then(() => {
                    readerDiv.style.display = "none";
                    document.getElementById('startScanBtn').innerText = "📷 开启摄像头原地扫码";
                });
                if (qrCodeMessage.includes('?')) {
                    processParams(qrCodeMessage.substring(qrCodeMessage.indexOf('?')));
                } else {
                    alert("非法的宿命凭证！\n识别到的原始文本为: " + qrCodeMessage);
                }
            },
            (err) => {}
        ).catch((err) => {
            const fallbackConfig = { fps: 15, qrbox: (w, h) => { const m = Math.min(w, h); return { width: Math.floor(m*0.75), height: Math.floor(m*0.75) }; } };
            html5QrcodeScanner.start(
                { facingMode: "environment" }, fallbackConfig,
                (qrCodeMessage) => {
                    html5QrcodeScanner.stop().then(() => { readerDiv.style.display = "none"; });
                    if (qrCodeMessage.includes('?')) processParams(qrCodeMessage.substring(qrCodeMessage.indexOf('?')));
                }, (err) => {}
            ).catch((fErr) => {
                alert("无法调取镜头！请直接让对方结果中的纯数字盲打入框。");
                readerDiv.style.display = "none";
                document.getElementById('startScanBtn').innerText = "📷 开启摄像头原地扫码";
            });
        });
    }

    // 🌟 核心升级：支持完全无下划线、空格等任何分隔符的纯快捷盲打解析
    function processManualInput() {
        let inputVal = document.getElementById('manualUrlInput').value.trim();
        if (!inputVal) {
            alert("请输入核销凭证内容！");
            return;
        }

        // 1. 标准 URL 解析兼容保持不变
        if (inputVal.includes('?')) {
            processParams(inputVal.substring(inputVal.indexOf('?')));
            document.getElementById('manualUrlInput').value = ""; 
            return;
        } else if (inputVal.includes('r=') && inputVal.includes('t=')) {
            processParams('?' + inputVal);
            document.getElementById('manualUrlInput').value = "";
            return;
        }

        // 2. 将用户输入转化为只有字母或数字的纯连续字符串
        let cleanStr = inputVal.replace(/[_\-\s]+/g, ""); 
        
        if (cleanStr.length >= 3) {
            // 切割第 1 位：段位代码
            let rawRankCode = cleanStr.charAt(0);
            let rankStr = "";
            if (rawRankCode === "1" || rawRankCode.toUpperCase() === "SSR") rankStr = "SSR";
            else if (rawRankCode === "2" || rawRankCode.toUpperCase() === "SR") rankStr = "SR";
            else if (rawRankCode === "3" || rawRankCode.toUpperCase() === "A") rankStr = "A";
            else if (rawRankCode === "4" || rawRankCode.toUpperCase() === "B") rankStr = "B";

            // 提取后面剩余的所有数字
            let numPart = cleanStr.substring(1);

            if (rankStr && numPart.length >= 2) {
                // 前两位一定是牌号（00-81）
                let tarotId = parseInt(numPart.substring(0, 2), 10);
                let scoreStr = numPart.substring(2);

                // 根据你发来的 5 项格式规范（段位_牌号_识_疾_律），动态拆解后续连打数字
                let score = "0";
                let re = "0";
                let rh = "100";

                if (scoreStr.length > 0) {
                    if (scoreStr.length <= 3) {
                        // 如果剩下1-3位，全部归属于【识pt】(如 85 或 100)
                        score = scoreStr;
                    } else {
                        // 超过3位说明包含了【疾】与【律】，自适应切片取值
                        score = scoreStr.substring(0, 2); 
                        let remaining = scoreStr.substring(2);
                        if (remaining.length >= 3) {
                            re = remaining.substring(0, remaining.length - 2); 
                            rh = remaining.substring(remaining.length - 2); 
                        } else {
                            re = remaining;
                        }
                    }
                }

                if (!isNaN(tarotId)) {
                    let generatedQuery = `?r=${rankStr}&t=${tarotId}&m=${score}&re=${re}&rh=${rh}`;
                    processParams(generatedQuery);
                    document.getElementById('manualUrlInput').value = ""; 
                    return;
                }
            }
        }

        alert("识读失败！请输入正确长度的数字串。\n例如：11285（代表 SSR，12号牌，85分）");
    }

    function processParams(queryString) {
        const urlParams = new URLSearchParams(queryString);
        const r = urlParams.get('r'); 
        const t = urlParams.get('t'); 
        const m = urlParams.get('m'); 
        const re = urlParams.get('re'); 
        const rh = urlParams.get('rh'); 

        if (r && t) {
            const rankMap = { "SSR": "SSR 阶 · 破晓之神", "SR": "SR 阶 · 星轨编织者", "A": "A 阶 · 密教执行官", "B": "B 阶 · 迷途观测者" };
            const fullRank = rankMap[r] || r;
            const tarotName = tarotNames[parseInt(t)] || "未知天命牌 (" + t + ")";

            currentData = { rank: fullRank, tarot: tarotName, stats: `识:${m||0}pt / 疾:${re||0}ms / 律:${rh||0}%` };

            const statusText = document.getElementById('parse-status');
            statusText.innerText = "✦ 契约凭证解析成功，请确认下方信息并点击核销 ✦";
            statusText.style.color = "var(--green)";

            const rankEl = document.getElementById('player-rank');
            rankEl.innerText = fullRank;
            rankEl.className = "val rank-" + r;

            document.getElementById('player-tarot').innerText = tarotName;
            document.getElementById('player-scores').innerText = currentData.stats;

            document.getElementById('confirmBtn').disabled = false;
        }
    }

    function toggleGuestMode() {
        const isGuestChecked = document.getElementById('isGuest').checked;
        const countInput = document.getElementById('guestGiftCount');
        
        if (isGuestChecked) {
            currentPool = 'guest';
            document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-guest').classList.add('active');
            countInput.style.display = "block";
        } else {
            currentPool = 'current_day';
            document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-current-day').classList.add('active');
            countInput.style.display = "none";
            countInput.value = 1;
        }
    }

    async function executeVerification() {
        if (!currentData) return;

        let deductCount = 1;
        const isGuestMode = document.getElementById('isGuest').checked;

        if (isGuestMode) {
            const inputCount = parseInt(document.getElementById('guestGiftCount').value);
            if (isNaN(inputCount) || inputCount <= 0) {
                alert("请输入合法的发放礼品数量！");
                return;
            }
            deductCount = inputCount;
        }

        const targetDbPoolId = (currentPool === 'guest') ? 'guest' : currentActiveDayId;

        await fetchStocksFromCloud();

        if (rawStocks[targetDbPoolId] < deductCount) {
            const goAhead = confirm(`⚠️ 当前库存不足！是否强制透支扣减？`);
            if (!goAhead) return;
        }

        const newCount = rawStocks[targetDbPoolId] - deductCount;

        const { error: stockErr } = await _supabase
            .from('stocks')
            .update({ count: newCount })
            .eq('id', targetDbPoolId);

        if (stockErr) {
            alert("同步库存到云端失败: " + stockErr.message);
            return;
        }

        const { error: logErr } = await _supabase.from('logs').insert([{
            rank: currentData.rank,
            tarot: currentData.tarot,
            pool: targetDbPoolId,
            count: deductCount
        }]);

        if (logErr) {
            console.error("云端日志备份失败，但扣库存已成功:", logErr.message);
        }

        rawStocks[targetDbPoolId] = newCount;
        updateStockUI();
        
        logToHistory(currentData.rank, currentData.tarot, targetDbPoolId, deductCount);

        alert(`🎉 云端核销成功！礼品扣减与流水日志已同步。`);

        document.getElementById('confirmBtn').disabled = true;
        document.getElementById('parse-status').innerText = "✅ 本张二维码已完成核销，请准备扫描下一位";
        document.getElementById('parse-status').style.color = "#888";
        currentData = null; 
    }

    function logToHistory(rank, tarot, poolField, count) {
        const listContainer = document.getElementById('historyList');
        if (listContainer.innerText.includes("暂无当前核销记录")) {
            listContainer.innerHTML = "";
        }
        const time = new Date().toLocaleTimeString();
        const poolNameMap = { day1: "第一天", day2: "第二天", guest: "特别嘉宾" };
        const itemHtml = `
            <div class="history-item">
                <span>[${time}] <b>${rank}</b> (${tarot})</span>
                <span style="color:var(--gold)">核销【${poolNameMap[poolField] || poolField}】发货 ${count} 个</span>
            </div>
        `;
        listContainer.innerHTML = itemHtml + listContainer.innerHTML;
    }

    function setupRealtimeListeners() {
        _supabase
            .channel('staff-hub-channel')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'config' }, payload => {
                if (payload.new.id === 'current_active_day') {
                    currentActiveDayId = payload.new.value;
                    updateDayButtonsUI(payload.new.value);
                    updateStockUI();
                }
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                rawStocks[payload.new.id] = payload.new.count;
                updateStockUI();
            })
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logs' }, async () => {
                await fetchTotalScannedCount(); 
            })
            .subscribe();
    }

    window.onload = doAuthentication;
</script>
