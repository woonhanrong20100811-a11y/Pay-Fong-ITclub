<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿命法典 · 核心核销枢纽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #c29f64;
            --bg-dark: #121216;
            --card-bg: #1a1a22;
            --green: #2ecc71;
            --red: #e74c3c;
        }
        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .staff-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            display: none; /* 验证成功前隐藏 */
        }
        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            border-bottom: 2px double rgba(194,159,100,0.3);
            padding-bottom: 10px;
        }
        
        /* 库存看板 */
        .stock-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stock-card {
            background: #22222c;
            border: 1px solid rgba(194,159,100,0.2);
            border-radius: 6px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
        }
        .stock-card.active {
            border-color: var(--gold);
            background: rgba(194,159,100,0.1);
            box-shadow: 0 0 10px rgba(194,159,100,0.2);
        }
        .stock-card h3 {
            margin: 0 0 5px 0;
            font-size: 0.85rem;
            color: var(--gold);
        }
        .stock-num {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        /* 扫码互动功能区 */
        .scanner-section {
            background: #0d0d11;
            border: 1px dashed rgba(194,159,100,0.4);
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .scan-btn {
            background: #4a0e0e;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 25px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        #reader {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            border-radius: 6px;
            overflow: hidden;
            display: none;
        }

        /* 扫描解析面板 */
        .data-panel {
            background: #0d0d11;
            border-left: 4px solid var(--gold);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .data-row:last-child { margin-bottom: 0; }
        .label { color: #888; }
        .val { color: #fff; font-weight: bold; }
        .val.rank-SSR { color: #ff4a4a; text-shadow: 0 0 5px rgba(255,74,74,0.3); }
        .val.rank-SR { color: #ffaa00; }

        /* 特别嘉宾勾选区 */
        .guest-box {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .guest-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .guest-box label {
            font-weight: bold;
            color: var(--red);
            cursor: pointer;
        }
        .guest-box input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .guest-count-input {
            width: 70px;
            background: #222;
            border: 1px solid var(--red);
            color: white;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            font-size: 1rem;
            display: none;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-btn:hover { background: #dfb875; }
        .action-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* 历史记录 */
        .history-section {
            margin-top: 30px;
            border-top: 1px dashed rgba(194,159,100,0.3);
            padding-top: 15px;
        }
        .history-title {
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .history-list {
            max-height: 150px;
            overflow-y: auto;
            background: #0d0d11;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="staff-container" id="mainHub">
    <h1>培风资讯社 · 核销主控台</h1>

    <div class="stock-board">
        <div class="stock-card active" id="btn-day1" onclick="switchPool('day1')">
            <h3>第一天库存</h3>
            <div class="stock-num" id="stock-day1">--</div>
        </div>
        <div class="stock-card" id="btn-day2" onclick="switchPool('day2')">
            <h3>第二天库存</h3>
            <div class="stock-num" id="stock-day2">--</div>
        </div>
        <div class="stock-card" id="btn-guest" onclick="switchPool('guest')">
            <h3>特别嘉宾池</h3>
            <div class="stock-num" id="stock-guest">--</div>
        </div>
    </div>

    <div class="scanner-section">
        <button class="scan-btn" id="startScanBtn" onclick="startCameraScanner()">📷 开启摄像头原地扫码</button>
        <div id="reader"></div>
    </div>

    <div class="data-panel">
        <div class="data-row">
            <span class="label">解析状态：</span>
            <span class="val" id="parse-status" style="color:var(--red)">等待云端同步及扫描数据...</span>
        </div>
        <div class="data-row">
            <span class="label">玩家天命段位：</span>
            <span class="val" id="player-rank">-</span>
        </div>
        <div class="data-row">
            <span class="label">灵魂主控命牌：</span>
            <span class="val" id="player-tarot">-</span>
        </div>
        <div class="data-row">
            <span class="label">试炼原始成绩：</span>
            <span class="val" id="player-scores">-</span>
        </div>
    </div>

    <div class="guest-box">
        <div style="display:flex; flex-direction:column;">
            <label for="isGuest">✦ 激活特别嘉宾核销 ✦</label>
            <span style="font-size:0.75rem; color:#aaa; margin-top:3px;">勾选后转入嘉宾通道，支持多发礼品</span>
        </div>
        <div class="guest-control">
            <input type="checkbox" id="isGuest" onchange="toggleGuestMode()">
            <input type="number" id="guestGiftCount" class="guest-count-input" value="1" min="1">
        </div>
    </div>

    <button class="action-btn" id="confirmBtn" onclick="executeVerification()" disabled>确认核销并发放礼品</button>

    <div class="history-section">
        <div class="history-title">🕒 现场成功核销流水 (最新5条)</div>
        <div class="history-list" id="historyList">
            <div style="color:#666; text-align:center; padding:10px;">暂无当前核销记录</div>
        </div>
    </div>
</div>

<script>
    // ==================== 【已自动绑定你的 Supabase 信息】 ====================
    const SUPABASE_URL = "https://eglmalfktjrrvkiolqrd.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_H8C9O523vQl89-h-Y1Mj_A_7DjNCiQy"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==================== 【学号规格限制：XXXX-XXX 自动放行】 ====================
    function doAuthentication() {
        let inputID = prompt("【安全御守】请输入工作人员学号以进入法典枢纽：");
        if (inputID) {
            inputID = inputID.trim().replace(/\s+/g, ""); 
            const idPattern = /^\d{4}-\d{3}$/; // 4位数字-3位数字 规格
            if (idPattern.test(inputID)) {
                document.getElementById('mainHub').style.display = "block";
                initSystem();
            } else {
                alert("学号不符合 XXXX-XXX 规格，拒绝访问！");
                window.location.href = "about:blank";
            }
        } else {
            window.location.href = "about:blank";
        }
    }

    // ==================== 【云端数据核心控制】 ====================
    let stocks = { day1: 0, day2: 0, guest: 0 }; 
    let currentPool = 'day1'; 
    let currentData = null;   
    let html5QrcodeScanner = null; 

    const tarotNames = [
        "愚者", "魔术师", "女祭司", "皇后", "皇帝", "教皇", "恋人", "战车", "力量", "隐者", "命运之轮", "正义", "倒吊人", "死神", "节制", "恶魔", "塔", "星星", "月亮", "太阳", "审判", "世界",
        "权杖 Ace", "权杖二", "权杖三", "权杖四", "权杖五", "权杖六", "权杖七", "权杖八", "权杖九", "权杖十", "权杖侍从", "权杖骑士", "权杖皇后", "权杖国王",
        "圣杯 Ace", "圣杯二", "圣杯三", "圣杯四", "圣杯五", "圣杯六", "圣杯七", "圣杯八", "圣杯九", "圣杯十", "圣杯侍从", "圣杯骑士", "圣杯皇后", "圣杯国王",
        "宝剑 Ace", "宝剑二", "宝剑三", "宝剑四", "宝剑五", "宝剑六", "宝剑七", "宝剑八", "宝剑九", "宝剑十", "宝剑侍从", "宝剑骑士", "宝剑皇后", "宝剑国王",
        "钱币 Ace", "钱币二", "钱币三", "钱币四", "钱币五", "钱币六", "钱币七", "钱币八", "钱币九", "钱币十", "钱币侍从", "钱币骑士", "钱币皇后", "钱币国王"
    ];

    async function initSystem() {
        await fetchStocksFromCloud();
        processParams(window.location.search);
        
        // 开启云端实时监听：别人扣了库存，你的手机屏幕看板会秒同步刷新
        _supabase
            .channel('any')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                stocks[payload.new.id] = payload.new.count;
                updateStockUI();
            })
            .subscribe();
    }

    async function fetchStocksFromCloud() {
        const { data, error } = await _supabase.from('stocks').select('*');
        if (error) {
            console.error("无法读取云端库存:", error);
            document.getElementById('parse-status').innerText = "❌ 无法连接到云数据库，请检查 RLS 是否关闭！";
            return;
        }
        data.forEach(item => { stocks[item.id] = item.count; });
        updateStockUI();
        document.getElementById('parse-status').innerText = "📡 云端同步就绪，等待捕获数据...";
        document.getElementById('parse-status').style.color = "var(--gold)";
    }

    function updateStockUI() {
        document.getElementById('stock-day1').innerText = stocks.day1;
        document.getElementById('stock-day2').innerText = stocks.day2;
        document.getElementById('stock-guest').innerText = stocks.guest;
    }

    function switchPool(poolName) {
        if(document.getElementById('isGuest').checked) {
            alert("当前正处于【特别嘉宾】模式，系统已强制锁定嘉宾专属池。");
            return;
        }
        currentPool = poolName;
        document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
        document.getElementById('btn-' + poolName).classList.add('active');
    }

    // ==================== 【原生摄像头扫描解析】 ====================
    function startCameraScanner() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = "block";
        document.getElementById('startScanBtn').innerText = "🔄 镜头扫描运行中...";

        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5Qrcode("reader");
        }

        html5QrcodeScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (qrCodeMessage) => {
                html5QrcodeScanner.stop().then(() => {
                    readerDiv.style.display = "none";
                    document.getElementById('startScanBtn').innerText = "📷 开启摄像头原地扫码";
                });

                if (qrCodeMessage.includes('?')) {
                    const paramString = qrCodeMessage.substring(qrCodeMessage.indexOf('?'));
                    processParams(paramString);
                } else {
                    alert("非法的宿命凭证！");
                }
            },
            (err) => {}
        ).catch((err) => {
            alert("无法调取摄像头，请确认浏览器有相机使用权限。");
            readerDiv.style.display = "none";
            document.getElementById('startScanBtn').innerText = "📷 开启摄像头原地扫码";
        });
    }

    function processParams(queryString) {
        const urlParams = new URLSearchParams(queryString);
        const r = urlParams.get('r'); 
        const t = urlParams.get('t'); 
        const m = urlParams.get('m'); 
        const re = urlParams.get('re'); 
        const rh = urlParams.get('rh'); 

        if (r && t) {
            const rankMap = { "SSR": "SSR 阶 · 破晓之神", "SR": "SR 阶 · 星轨编织者", "A": "A 阶 · 密教执行官", "B": "B 阶 · 迷途观测者" };
            const fullRank = rankMap[r] || r;
            const tarotName = tarotNames[parseInt(t)] || "未知天命牌 (" + t + ")";

            currentData = { rank: fullRank, tarot: tarotName, stats: `识:${m}pt / 疾:${re}ms / 律:${rh}%` };

            const statusText = document.getElementById('parse-status');
            statusText.innerText = "✦ 契约凭证解析成功 ✦";
            statusText.style.color = "var(--green)";

            const rankEl = document.getElementById('player-rank');
            rankEl.innerText = fullRank;
            rankEl.className = "val rank-" + r;

            document.getElementById('player-tarot').innerText = tarotName;
            document.getElementById('player-scores').innerText = currentData.stats;

            document.getElementById('confirmBtn').disabled = false;
        }
    }

    // ==================== 【特殊嘉宾模式】 ====================
    function toggleGuestMode() {
        const isGuestChecked = document.getElementById('isGuest').checked;
        const countInput = document.getElementById('guestGiftCount');
        
        if (isGuestChecked) {
            currentPool = 'guest';
            document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-guest').classList.add('active');
            countInput.style.display = "block";
        } else {
            currentPool = 'day1';
            document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-day1').classList.add('active');
            countInput.style.display = "none";
            countInput.value = 1;
        }
    }

    // ==================== 【云端核销扣减动作】 ====================
    async function executeVerification() {
        if (!currentData) return;

        let deductCount = 1;
        const isGuestMode = document.getElementById('isGuest').checked;

        if (isGuestMode) {
            const inputCount = parseInt(document.getElementById('guestGiftCount').value);
            if (isNaN(inputCount) || inputCount <= 0) {
                alert("请输入合法的发放礼品数量！");
                return;
            }
            deductCount = inputCount;
        }

        // 重新同步一次最新库存，避免多人并发导致扣串
        await fetchStocksFromCloud();

        if (stocks[currentPool] < deductCount) {
            const goAhead = confirm(`⚠️ 当前库存已不足！是否强制透支扣减？`);
            if (!goAhead) return;
        }

        const newCount = stocks[currentPool] - deductCount;

        // 1. 同步扣减云端数据库数据
        const { error: stockErr } = await _supabase
            .from('stocks')
            .update({ count: newCount })
            .eq('id', currentPool);

        if (stockErr) {
            alert("同步库存到云端失败: " + stockErr.message);
            return;
        }

        // 2. 将这次流水写入云端日志对账表
        await _supabase.from('logs').insert([{
            rank: currentData.rank,
            tarot: currentData.tarot,
            pool: currentPool,
            count: deductCount
        }]);

        stocks[currentPool] = newCount;
        updateStockUI();
        logToHistory(currentData.rank, currentData.tarot, currentPool, deductCount);

        alert(`🎉 云端核销成功！\n剩余库存实时广播已同步。`);

        document.getElementById('confirmBtn').disabled = true;
        document.getElementById('parse-status').innerText = "✅ 本张二维码已完成核销，请准备扫描下一位";
        document.getElementById('parse-status').style.color = "#888";
    }

    function logToHistory(rank, tarot, pool, count) {
        const listContainer = document.getElementById('historyList');
        if (listContainer.innerText.includes("暂无当前核销记录")) {
            listContainer.innerHTML = "";
        }
        const time = new Date().toLocaleTimeString();
        const poolNameMap = { day1: "第一天", day2: "第二天", guest: "特别嘉宾" };
        const itemHtml = `
            <div class="history-item">
                <span>[${time}] <b>${rank}</b> (${tarot})</span>
                <span style="color:var(--gold)">扣减【${poolNameMap[pool]}】共 ${count} 个</span>
            </div>
        `;
        listContainer.innerHTML = itemHtml + listContainer.innerHTML;
    }

    window.onload = doAuthentication;
</script>

</body>
</html>
