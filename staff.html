<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>法典裁决 | 培风资讯社</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --ancient-gold: #c29f64;
            --deep-ink: #0f0f14;
            --blood-dark: #4a0e0e;
            --paper: #d8c8b8;
            --success-green: #2ecc71;
        }

        body {
            background: #0a0a0c radial-gradient(circle at center, #1e1e26 0%, #0a0a0c 100%);
            color: var(--paper);
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 25px;
            box-sizing: border-box;
            border-left: 2px solid rgba(194, 159, 100, 0.2);
            border-right: 2px solid rgba(194, 159, 100, 0.2);
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 2.6rem;
            text-align: center;
            color: var(--ancient-gold);
            margin: 0;
            text-shadow: 0 0 15px rgba(194, 159, 100, 0.3);
        }

        .subtitle {
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 4px;
            color: var(--ancient-gold);
            opacity: 0.7;
            margin-bottom: 35px;
        }

        /* 🔮 实时动态云端库存看板（与前台风格对齐） */
        .live-stock-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(194, 159, 100, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .stock-title {
            font-size: 0.8rem;
            color: var(--ancient-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-weight: bold;
        }
        .stock-display-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .stock-item {
            font-size: 0.85rem;
            color: #bbb;
        }
        .stock-item span {
            font-weight: bold;
            color: #fff;
            font-size: 1.1rem;
        }

        /* 灵魂报告裁决卡片 */
        .report-card {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid var(--ancient-gold);
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 0 30px rgba(194, 159, 100, 0.2);
            margin-bottom: 30px;
        }

        .rank-title {
            text-align: center;
            font-size: 1.8rem;
            color: #ff4a4a;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.4);
        }

        .report-item {
            border-bottom: 1px dashed rgba(194, 159, 100, 0.2);
            padding: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-item:last-child { border: none; }

        .item-label {
            color: var(--ancient-gold);
            font-size: 0.95rem;
        }

        .item-val {
            color: #fff;
            font-weight: bold;
            font-size: 1.05rem;
        }

        /* 元素卡片高亮底色 */
        #res_tarot {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
        }

        /* 核销渠道选择区域 */
        .pool-selector-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(194, 159, 100, 0.3);
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .pool-selector-box label {
            display: block;
            font-size: 0.9rem;
            color: var(--ancient-gold);
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
        }
        .radio-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ccc;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .radio-label input[type="radio"] {
            width: auto;
            accent-color: var(--ancient-gold);
            cursor: pointer;
        }

        /* 裁决核销大按钮 */
        .mystic-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--blood-dark);
            color: var(--ancient-gold);
            border: 1px solid var(--ancient-gold);
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .mystic-btn:active {
            background: var(--ancient-gold);
            color: black;
        }

        .mystic-btn:disabled {
            background: #222 !important;
            color: #555 !important;
            border-color: #333 !important;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-top: 30px;">法典裁决端</h1>
    <p class="subtitle">—— 培风资讯社 · 现场核销核心 ——</p>

    <div class="live-stock-panel">
        <div class="stock-title">✦ 当前圣殿盲盒剩余量 ✦</div>
        <div class="stock-display-row">
            <div class="stock-item">今日常规池: <span id="display-day">--</span> 个</div>
            <div class="stock-item">特别嘉宾池: <span id="display-guest">--</span> 个</div>
        </div>
    </div>

    <div class="report-card">
        <div class="rank-title" id="fate_rank">【等待扫码】</div>

        <div class="report-item">
            <span class="item-label">✦ 来宾最终评级</span>
            <span class="item-val" id="res_rank_txt">-</span>
        </div>
        <div class="report-item">
            <span class="item-label">✦ 灵魂主控命牌 (塔罗)</span>
            <span class="item-val" id="res_tarot">-</span>
        </div>
        <div class="report-item">
            <span class="item-label">✦ 灵视精度 (记忆力)</span>
            <span class="item-val" id="res_memory">-</span>
        </div>
        <div class="report-item">
            <span class="item-label">✦ 瞬动神速 (反应力)</span>
            <span class="item-val" id="res_reaction">-</span>
        </div>
        <div class="report-item">
            <span class="item-label">✦ 神圣律动 (节奏感)</span>
            <span class="item-val" id="res_rhythm">-</span>
        </div>
    </div>

    <div class="pool-selector-box">
        <label>⚡ 请选择扣除的礼品池信道 ⚡</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="poolType" value="day" checked> 扣除常规池
            </label>
            <label class="radio-label">
                <input type="radio" name="poolType" value="guest"> 扣除特别嘉宾池
            </label>
        </div>
    </div>

    <button class="mystic-btn" id="verifyBtn" onclick="executeVerification()" disabled>⚡ 确认裁决 · 扣除盲盒库存</button>
</div>

<script>
    // ==================== 【Supabase 云端实时初始化连接】 ====================
    const SUPABASE_URL = "https://eglmalfktjrrvkiolqrd.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_H8C9O523vQl89-h-Y1Mj_A_7DjNCiQy"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 塔罗牌华文对照数据库 (与 index.html 完全对齐)
    const tarotDatabase = [
        { name: "愚者 (The Fool)" }, { name: "魔术师 (The Magician)" }, { name: "女祭司 (The High Priestess)" },
        { name: "皇后 (The Empress)" }, { name: "皇帝 (The Emperor)" }, { name: "教皇 (The Hierophant)" },
        { name: "恋人 (The Lovers)" }, { name: "战车 (The Chariot)" }, { name: "力量 (Strength)" },
        { name: "隐者 (The Hermit)" }, { name: "命运之轮 (The Wheel of Fortune)" }, { name: "正义 (Justice)" },
        { name: "倒吊人 (The Hanged Man)" }, { name: "死神 (Death)" }, { name: "节制 (Temperance)" },
        { name: "恶魔 (The Devil)" }, { name: "塔 (The Tower)" }, { name: "星星 (The Star)" },
        { name: "月亮 (The Moon)" }, { name: "太阳 (The Sun)" }, { name: "审判 (Judgement)" },
        { name: "世界 (The World)" },
        { name: "权杖 Ace (Ace of Wands)" }, { name: "权杖二 (Two of Wands)" }, { name: "权杖三 (Three of Wands)" },
        { name: "权杖四 (Four of Wands)" }, { name: "权杖五 (Five of Wands)" }, { name: "权杖六 (Six of Wands)" },
        { name: "权杖七 (Seven of Wands)" }, { name: "权杖八 (Eight of Wands)" }, { name: "权杖九 (Nine of Wands)" },
        { name: "权杖十 (Ten of Wands)" }, { name: "权杖侍从 (Page of Wands)" }, { name: "权杖骑士 (Knight of Wands)" },
        { name: "权杖皇后 (Queen of Wands)" }, { name: "权杖国王 (King of Wands)" },
        { name: "圣杯 Ace (Ace of Cups)" }, { name: "圣杯二 (Two of Cups)" }, { name: "圣杯三 (Three of Cups)" },
        { name: "圣杯四 (Four of Cups)" }, { name: "圣杯五 (Five of Cups)" }, { name: "圣杯六 (Six of Cups)" },
        { name: "圣杯七 (Seven of Cups)" }, { name: "圣杯八 (Eight of Cups)" }, { name: "圣杯九 (Nine of Cups)" },
        { name: "圣杯十 (Ten of Cups)" }, { name: "圣杯侍从 (Page of Cups)" }, { name: "圣杯骑士 (Knight of Cups)" },
        { name: "圣杯皇后 (Queen of Cups)" }, { name: "圣杯国王 (King of Cups)" },
        { name: "宝剑 Ace (Ace of Swords)" }, { name: "宝剑二 (Two of Swords)" }, { name: "宝剑三 (Three of Swords)" },
        { name: "宝剑四 (Four of Swords)" }, { name: "宝剑五 (Five of Swords)" }, { name: "宝剑六 (Six of Swords)" },
        { name: "宝剑七 (Seven of Swords)" }, { name: "宝剑八 (Eight of Swords)" }, { name: "宝剑九 (Nine of Swords)" },
        { name: "宝剑十 (Ten of Swords)" }, { name: "宝剑侍从 (Page of Swords)" }, { name: "宝剑骑士 (Knight of Swords)" },
        { name: "宝剑皇后 (Queen of Swords)" }, { name: "宝剑国王 (King of Swords)" },
        { name: "钱币 Ace (Ace of Pentacles)" }, { name: "钱币二 (Two of Pentacles)" }, { name: "钱币三 (Three of Pentacles)" },
        { name: "钱币四 (Four of Pentacles)" }, { name: "钱币五 (Five of Pentacles)" }, { name: "钱币六 (Six of Pentacles)" },
        { name: "钱币七 (Seven of Pentacles)" }, { name: "钱币八 (Eight of Pentacles)" }, { name: "钱币九 (Nine of Pentacles)" },
        { name: "钱币十 (Ten of Pentacles)" }, { name: "钱币侍从 (Page of Pentacles)" }, { name: "钱币骑士 (Knight of Pentacles)" },
        { name: "钱币皇后 (Queen of Pentacles)" }, { name: "钱币国王 (King of Pentacles)" }
    ];

    let currentDayStockId = "day1"; // 默认第一天常规池
    let currentDayCount = 0;
    let guestCount = 0;

    window.onload = async function() {
        // 自动判定当前是会考第几天（26号及之后自动绑定day2库）
        const todayDate = new Date().getDate();
        if (todayDate >= 26) {
            currentDayStockId = "day2";
        }

        // 初始化拉取实时数据
        await fetchStocks();

        // 实时监听数据库变动
        _supabase
            .channel('staff-watch')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                updateLocalStockState(payload.new.id, payload.new.count);
            })
            .subscribe();

        // 解析 URL 参数（扫码传进来的数据）
        parseUrlParams();
    }

    async function fetchStocks() {
        const { data, error } = await _supabase.from('stocks').select('*');
        if (!error && data) {
            data.forEach(item => {
                updateLocalStockState(item.id, item.count);
            });
        }
    }

    function updateLocalStockState(id, count) {
        if (id === 'guest') {
            guestCount = count;
            const el = document.getElementById('display-guest');
            if(el) el.innerText = count;
        } else if (id === currentDayStockId) {
            currentDayCount = count;
            const el = document.getElementById('display-day');
            if(el) el.innerText = count;
        }
    }

    // ==================== 【逆向解密扫码数据逻辑】 ====================
    function parseUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const rank = params.get('r');
        const tarotStr = params.get('t');
        const mem = params.get('m');
        const react = params.get('re');
        const rhythm = params.get('rh');

        if (!rank && !tarotStr) {
            document.getElementById('fate_rank').innerText = "【等待扫码】";
            return;
        }

        // 1. 解密段位
        const decodedRank = decodeURIComponent(rank || "B");
        let fullRankText = "B 阶 · 迷途观测者";
        if (decodedRank === "SSR") fullRankText = "SSR 阶 · 破晓之神";
        if (decodedRank === "SR") fullRankText = "SR 阶 · 星轨编织者";
        if (decodedRank === "A") fullRankText = "A 阶 · 密教执行官";

        document.getElementById('fate_rank').innerText = "✦ 报告加载成功 ✦";
        document.getElementById('res_rank_txt').innerText = fullRankText;
        if (decodedRank === "SSR") {
            document.getElementById('res_rank_txt').style.color = "#ff4a4a";
        } else if (decodedRank === "SR") {
            document.getElementById('res_rank_txt').style.color = "#ffaa00";
        } else {
            document.getElementById('res_rank_txt').style.color = "var(--ancient-gold)";
        }

        // 2. 逆向映射华文命牌
        const tarotIndex = parseInt(tarotStr) || 0;
        const matchedTarot = tarotDatabase[tarotIndex] || { name: "未知命牌" };
        const tarotEl = document.getElementById('res_tarot');
        tarotEl.innerText = matchedTarot.name;

        // 根据四大元素为命牌加持特异颜色特效
        if (matchedTarot.name.includes("权杖")) {
            tarotEl.style.color = "#ff5555"; // 火元素红
        } else if (matchedTarot.name.includes("圣杯")) {
            tarotEl.style.color = "#55aaff"; // 水元素蓝
        } else if (matchedTarot.name.includes("宝剑")) {
            tarotEl.style.color = "#55ffaa"; // 风元素绿
        } else if (matchedTarot.name.includes("钱币")) {
            tarotEl.style.color = "#e67e22"; // 土元素橙
        } else {
            tarotEl.style.color = "var(--ancient-gold)";
        }

        // 3. 填入具体测试数值
        document.getElementById('res_memory').innerText = (mem || "0") + " pt";
        document.getElementById('res_reaction').innerText = (react || "0") + " ms";
        document.getElementById('res_rhythm').innerText = (rhythm || "0") + " %";

        // 激活核销大按钮
        document.getElementById('verifyBtn').disabled = false;
    }

    // ==================== 【执行云端扣减核销核心】 ====================
    async function executeVerification() {
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.innerText = "正在镌刻法典并扣减库存...";

        const selectedPool = document.querySelector('input[name="poolType"]:checked').value;
        
        let targetId = currentDayStockId; // 默认常规池
        let currentCount = currentDayCount;

        if (selectedPool === 'guest') {
            targetId = "guest";
            currentCount = guestCount;
        }

        if (currentCount <= 0) {
            alert("⚠️ 圣殿警告：当前选中的盲盒礼品池已经没有库存了！无法执行核销。");
            btn.disabled = false;
            btn.innerText = "⚡ 确认裁决 · 扣除盲盒库存";
            return;
        }

        const newCount = currentCount - 1;

        // 写入 Supabase 进行安全原子更新
        const { error } = await _supabase
            .from('stocks')
            .update({ count: newCount })
            .eq('id', targetId);

        if (error) {
            alert("❌ 核销失败，云端同步受阻: " + error.message);
            btn.disabled = false;
            btn.innerText = "⚡ 确认裁决 · 扣除盲盒库存";
        } else {
            alert(`🎉 核销成功！已成功扣除【${selectedPool === 'guest' ? '特别嘉宾池' : '今日常规池'}】盲盒 1 个。当前剩余：${newCount} 个。`);
            btn.innerText = "✅ 核销完毕 · 已生效";
            btn.style.background = "var(--success-green)";
            btn.style.color = "#fff";
        }
    }
</script>

</body>
</html>
