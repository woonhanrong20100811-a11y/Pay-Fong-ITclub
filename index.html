<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人格解码站 | 培风资讯社</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ancient-gold: #c29f64;
            --deep-ink: #0f0f14;
            --blood-dark: #4a0e0e;
            --paper: #d8c8b8;
        }

        body {
            background: #0a0a0c radial-gradient(circle at center, #1e1e26 0%, #0a0a0c 100%);
            color: var(--paper);
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 自动适配：利用百分比与最大宽度让网页在电脑、平板和手机间完美舒展自适应 */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 6%;
            box-sizing: border-box;
            position: relative;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 4%;
            }
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 2.5rem;
            text-align: center;
            color: var(--ancient-gold);
            margin: 0;
            text-shadow: 0 0 15px rgba(194, 159, 100, 0.3);
        }

        .subtitle {
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 4px;
            color: var(--ancient-gold);
            opacity: 0.7;
            margin-bottom: 35px;
        }

        .live-stock-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(194, 159, 100, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        
        .stock-display-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .stock-item {
            font-size: 0.85rem;
            color: #bbb;
        }
        
        .stock-item span {
            font-weight: bold;
            color: #fff;
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .step {
            display: none; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .step.active { 
            display: block !important; 
            opacity: 1 !important;
        }

        .input-ritual-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(194, 159, 100, 0.3);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--ancient-gold);
            margin-bottom: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--ancient-gold);
            color: white;
            padding: 8px 5px;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-bottom: 2px solid white;
            background: rgba(194, 159, 100, 0.05);
        }

        .tarot-numbers {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .tarot-numbers input {
            text-align: center;
            font-size: 1.4rem;
            color: var(--ancient-gold);
        }

        .mystic-btn {
            display: block;
            width: 95%;
            max-width: 340px;
            margin: 20px auto 0 auto;
            padding: 12px 10px;
            background: var(--blood-dark);
            color: var(--ancient-gold);
            border: 1px solid var(--ancient-gold);
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 1.25rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
            white-space: nowrap; /* 核心：强制绝对单行不换行 */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mystic-btn:active {
            background: var(--ancient-gold);
            color: black;
        }

        .game-tag {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
        }

        .report-card {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid var(--ancient-gold);
            border-radius: 12px;
            padding: 30px 22px;
            box-shadow: 0 0 30px rgba(194, 159, 100, 0.2);
            margin-bottom: 20px;
        }

        #pdf-clone-template {
            display: none;
        }

        .rank-title {
            text-align: center;
            font-size: 1.8rem;
            color: #ff4a4a;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.4);
        }

        .card-visual-container {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        
        .card-visual-img {
            width: 100%;
            max-width: 260px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(194, 159, 100, 0.4);
            border: 1px solid rgba(194, 159, 100, 0.6);
        }

        .report-item {
            border-bottom: 1px dashed rgba(194, 159, 100, 0.2);
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-item:last-child { border: none; }

        .item-label {
            color: var(--ancient-gold);
            font-size: 0.9rem;
        }

        .item-val {
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
        }

        .destiny-text {
            background: rgba(194, 159, 100, 0.04);
            border-left: 3px solid var(--ancient-gold);
            padding: 15px;
            font-size: 0.92rem;
            line-height: 1.75;
            color: #ccc;
            margin-top: 25px;
            text-align: justify;
        }

        .qrcode-box {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 2px double rgba(194, 159, 100, 0.3);
            text-align: center;
        }
        
        .qrcode-title {
            font-size: 1.05rem;
            color: var(--ancient-gold);
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .qrcode-hint {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 15px;
        }
        
        #qrcode-container {
            display: inline-block;
            padding: 8px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        
        .qrcode-code-display {
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--ancient-gold);
            letter-spacing: 1.5px;
            font-weight: bold;
            line-height: 1.6;
        }
        
        .qrcode-code-val {
            display: block;
            font-size: 1.25rem;
            color: #fff;
            text-shadow: 0 0 8px rgba(194, 159, 100, 0.6);
            margin-top: 4px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step0">
        <h1 style="margin-top: 50px;">人格解码站</h1>
        <p class="subtitle">—— 培风资讯社 ——</p>
        
        <p style="text-align: center; line-height: 2; color: var(--ancient-gold); font-size: 1.1rem; letter-spacing: 1px; font-weight: bold; margin-bottom: 40px; text-shadow: 0 0 10px rgba(194, 159, 100, 0.2);">
            欢迎来到数据与命运的交织之地。<br>

                <span style="color: #888; letter-spacing: 1px;">✦</span>
            </div>
        </div>
    </div>

    <div class="step" id="step1">
        <h1>建立契约</h1>
        <p class="subtitle">第一阶段：契约</p>

        <div class="input-ritual-box">
            <label>「生辰」</label>
            <input type="text" id="birthdate" placeholder="请填写格式如：1913-07-07" inputmode="numeric">

            <div class="tarot-numbers">

                <input type="number" id="t3" placeholder="Ⅲ" min="0" max="77">
            </div>
        </div>

    </div>

    <div class="step" id="step2">

            <input type="number" id="score_memory" placeholder="输入最终得分">
            <div class="game-tag">记忆精确度测试</div>
        </div>

        <div class="input-ritual-box">
            <label>「速」反应试炼 (毫秒)</label>
            <input type="number" id="score_reaction" placeholder="输入反应毫秒">
            <div class="game-tag">反应时间感知</div>
        </div>

        <div class="input-ritual-box">
            <label>「律」节奏准度 (%)</label>
            <input type="number" id="score_rhythm" placeholder="输入准度百分比 (%)">
            <div class="game-tag">节奏同步率</div>
        </div>

        <button class="mystic-btn" onclick="generateFate()">解析灵魂报告</button>
    </div>

    <div class="step" id="step3">

                <span class="item-val" id="res_constellation">-</span>
            </div>
            <div class="report-item">
                <span class="item-label">✦ 灵魂主控牌 (塔罗)</span>
                <span class="item-val" id="res_tarot">-</span>
            </div>
            <div class="report-item">
                <span class="item-label">✦ 灵视精度 (记忆力)</span>
                <span class="item-val" id="res_memory">-</span>
            </div>
            <div class="report-item">
                <span class="item-label">✦ 瞬动神速 (反应力)</span>
                <span class="item-val" id="res_reaction">-</span>
            </div>
            <div class="report-item">
                <span class="item-label">✦ 神圣律动 (节奏感)</span>
                <span class="item-val" id="res_rhythm">-</span>
            </div>

            <div class="qrcode-box">

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentActiveDayId = "day1"; 
    let globalStocksData = { day1: 0, day2: 0, guest: 0 }; 

    window.onload = function() {
        initSmartStockSystem();
    }

    async function initSmartStockSystem() {
        try {
            const { data: configData, error: configErr } = await _supabase
                .from('config')
                .select('value')
                .eq('id', 'current_active_day')
                .single();

            if (!configErr && configData) {
                currentActiveDayId = configData.value; 
            }

            await fetchStockForPlayers();

            _supabase
                .channel('player-global-watch')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                    globalStocksData[payload.new.id] = payload.new.count;
                    renderStockUI();
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'config' }, async (payload) => {
                    if (payload.new.id === 'current_active_day') {
                        currentActiveDayId = payload.new.value; 
                        renderStockUI(); 
                    }
                })
                .subscribe();
        } catch (err) {
            console.error("云端实时同步系统初始化异常:", err);
        }
    }

    async function fetchStockForPlayers() {
        const { data, error } = await _supabase.from('stocks').select('*');
        if (!error && data) {
            data.forEach(item => {
                globalStocksData[item.id] = item.count;
            });
            renderStockUI();
        }
    }

        const dayLabelEl = document.getElementById('display-day-label');
        const dayNumEl = document.getElementById('display-day');
        
        if (currentActiveDayId === 'day1') {
            if (dayLabelEl) dayLabelEl.innerText = "第一天礼品";
            if (dayNumEl) dayNumEl.innerText = globalStocksData.day1;

    function parseAndValidateDate(dateString) {
        if (!dateString) return null;
        let year = NaN, month = NaN, day = NaN;

        if (/^\d{8}$/.test(dateString)) {
            year = parseInt(dateString.substring(0, 4), 10);
            month = parseInt(dateString.substring(4, 6), 10);
            day = parseInt(dateString.substring(6, 8), 10);
        } else {
            const cleanStr = dateString.replace(/[\/\.\s]/g, '-');
            const parts = cleanStr.split('-');
            if (parts.length >= 3) {
                year = parseInt(parts[0], 10);
                month = parseInt(parts[1], 10);
                day = parseInt(parts[2], 10);
            } else {
                const d = new Date(cleanStr);
                if (!isNaN(d.getTime())) {
                    year = d.getFullYear();
                    month = d.getMonth() + 1;
                    day = d.getDate();
                }
            }
        }

        if (isNaN(year) || isNaN(month) || isNaN(day)) return null;
        if (month < 1 || month > 12 || day < 1 || year < 1800 || year > 2100) return null;

        const monthDays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        if (month === 2) {
            const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            if (day > (isLeap ? 29 : 28)) return null;
        } else {
            if (day > monthDays[month - 1]) return null;
        }
        return { year, month, day };
    }

    function getConstellation(dateString) {
        const parsedDate = parseAndValidateDate(dateString);
        if (!parsedDate) return "未知星座";
        const month = parsedDate.month;
        const day = parsedDate.day;
        const dates = [20, 19, 21, 20, 21, 22, 23, 23, 23, 24, 23, 22];
        const consts = ["摩羯座", "水瓶座", "双鱼座", "白羊座", "金牛座", "双子座", "巨蟹座", "狮子座", "处女座", "天秤座", "天蝎座", "射手座"];
        return day < dates[month - 1] ? consts[month - 1] : consts[month % 12];
    }

        setTimeout(() => {
            html2pdf().set(options).from(pdfWrapper).save().then(() => {
                btn.innerText = "✦ 拓印留存 (下载PDF报告) ✦";
                btn.disabled = false;
                pdfWrapper.remove(); 
            }).catch(err => {
                alert("PDF 拓印生成失败: " + err.message);
                btn.innerText = "✦ 拓印留存 (下载PDF报告) ✦";
                btn.disabled = false;
                if(pdfWrapper) pdfWrapper.remove();
            });
        }, 50);
    }
</script>
