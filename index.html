<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人格解码站 | 培风资讯社</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --ancient-gold: #c29f64; --deep-ink: #0f0f14; --blood-dark: #4a0e0e; --paper: #d8c8b8; }
        body { background: #0a0a0c; color: var(--paper); font-family: 'Noto Serif SC', serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; padding: 40px 6%; box-sizing: border-box; }
        .step { display: none; }
        .step.active { display: block; }
        h1 { font-family: 'Ma Shan Zheng', cursive; text-align: center; color: var(--ancient-gold); }
        .subtitle { text-align: center; color: var(--ancient-gold); margin-bottom: 35px; }
        .input-ritual-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(194,159,100,0.3); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        label { color: var(--ancient-gold); display: block; margin-bottom: 10px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ancient-gold); color: white; padding: 8px; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        .mystic-btn { display: block; width: 95%; max-width: 340px; margin: 20px auto; padding: 12px; background: var(--blood-dark); color: var(--ancient-gold); border: 1px solid var(--ancient-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.25rem; cursor: pointer; border-radius: 4px; }
        .tarot-numbers { display: flex; gap: 15px; justify-content: space-between; }
        .tarot-numbers input { text-align: center; }
        .report-card { background: #161616; border: 2px solid var(--ancient-gold); padding: 20px; border-radius: 12px; margin-top: 20px; }
        #qrcode-container { display: flex; justify-content: center; margin-top: 20px; background: white; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step0">
        <h1 style="margin-top: 50px;">人格解码站</h1>
        <p class="subtitle">培风资讯社</p>
        <button class="mystic-btn" onclick="nextStep(1)">开始探索</button>
    </div>

    <div class="step" id="step1">
        <h1>建立契约</h1>
        <div class="input-ritual-box">
            <label>「生辰」(YYYY-MM-DD)</label>
            <input type="text" id="birthdate" placeholder="1913-07-07">
        </div>
        <div class="input-ritual-box">
            <label>「三位天命」(0-77)</label>
            <div class="tarot-numbers">
                <input type="number" id="t1" placeholder="Ⅰ">
                <input type="number" id="t2" placeholder="Ⅱ">
                <input type="number" id="t3" placeholder="Ⅲ">
            </div>
        </div>
        <button class="mystic-btn" onclick="nextStep(2)">同步星轨</button>
    </div>

    <div class="step" id="step2">
        <h1>提取试炼</h1>
        <div class="input-ritual-box">
            <label>「记」记忆测试</label>
            <input type="number" id="score_memory" placeholder="得分">
            <label>「速」反应试炼 (ms)</label>
            <input type="number" id="score_reaction" placeholder="毫秒">
            <label>「律」节奏准度 (%)</label>
            <input type="number" id="score_rhythm" placeholder="百分比">
        </div>
        <button class="mystic-btn" onclick="finishAndShow()">解析灵魂报告</button>
    </div>

    <div class="step" id="step3">
        <h1>灵魂法典</h1>
        <div class="report-card">
            <div id="res_text" style="color:#fff; line-height:1.6;">正在生成报告...</div>
            <div id="qrcode-container"></div>
        </div>
        <button class="mystic-btn" onclick="nextStep(0)">重新解构</button>
    </div>
</div>

<script>
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function finishAndShow() {
        const mem = document.getElementById('score_memory').value;
        if(!mem) { alert("请填写完整数据"); return; }
        
        document.getElementById('res_text').innerText = "灵魂已解析完成。您的试炼数据已记录。";
        
        // 简单生成一个核销码演示
        const code = Math.floor(Math.random()*900000);
        document.getElementById('res_text').innerHTML += `<br><br><b>您的契约核销码：${code}</b>`;
        
        nextStep(3);
    }
</script>

</body>
</html>
