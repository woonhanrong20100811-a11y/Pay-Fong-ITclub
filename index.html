<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿命数据实验室 | 培风资讯社</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --ancient-gold: #c29f64;
            --deep-ink: #0f0f14;
            --paper: #d8c8b8;
            --blood-dark: #4a0e0e;
        }

        body {
            background: #0a0a0c radial-gradient(circle at center, #1e1e26 0%, #0a0a0c 100%);
            color: var(--paper);
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 2.8rem;
            color: var(--ancient-gold);
            margin: 10px 0 0 0;
            text-shadow: 0 0 15px rgba(194, 159, 100, 0.4);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--ancient-gold);
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* 🔮 圣殿动态云端库存看板（全自动实时变动） */
        .stock-live-banner {
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed var(--ancient-gold);
            border-radius: 8px;
            padding: 12px;
            margin: 15px auto 25px auto;
            max-width: 280px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        .stock-title {
            font-size: 0.75rem;
            color: var(--ancient-gold);
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .stock-num-box {
            font-size: 1.1rem;
            color: #fff;
        }
        #index-day-stock {
            font-size: 1.5rem;
            color: #ff4a4a;
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.3);
        }

        /* 游戏核心区面板 */
        .game-panel {
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid rgba(194, 159, 100, 0.3);
            border-radius: 12px;
            padding: 25px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .mystic-btn {
            background: var(--blood-dark);
            color: var(--ancient-gold);
            border: 1px solid var(--ancient-gold);
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 1.4rem;
            padding: 12px 30px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s;
            border-radius: 4px;
            width: 80%;
            max-width: 260px;
        }

        .mystic-btn:active {
            background: var(--ancient-gold);
            color: #000;
        }

        /* 弹窗因果法典报告 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .mystic-card {
            background: #0f0f14;
            border: 2px solid var(--ancient-gold);
            border-radius: 16px;
            width: 88%;
            max-width: 380px;
            padding: 30px 20px;
            box-shadow: 0 0 40px rgba(194, 159, 100, 0.3);
            position: relative;
            box-sizing: border-box;
        }

        .card-title {
            font-family: 'Ma Shan Zheng', cursive, serif;
            font-size: 2.2rem;
            color: #ff4a4a;
            margin: 0 0 5px 0;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--ancient-gold);
            letter-spacing: 3px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(194, 159, 100, 0.2);
            padding: 10px 0;
            font-size: 0.95rem;
        }
        .stat-label { color: var(--ancient-gold); }
        .stat-val { color: #fff; font-weight: bold; }

        /* 二维码生成容器 */
        #qrcode-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            width: 140px;
            height: 140px;
            margin: 25px auto 15px auto;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: var(--ancient-gold);
            font-size: 1.5rem; cursor: pointer;
            opacity: 0.6;
        }
        .close-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-top: 20px;">宿命数据实验室</h1>
    <p class="subtitle">—— 培风资讯社 · 2026会考特展 ——</p>

    <div class="stock-live-banner">
        <div class="stock-title">✦ 圣殿盲盒今日剩余 ✦</div>
        <div class="stock-num-box">
            <span id="index-day-stock">--</span> 个
        </div>
    </div>

    <div class="game-panel">
        <p style="font-size: 0.9rem; line-height: 1.6; color: #bbb; padding: 0 10px;">
            点击下方纽结，开启身手演武。<br>
            灵视（记忆）、瞬动（反应）、律动（节奏）三轮试炼后，<br>
            古老的数字法典将判决出你的终极宿命牌。
        </p>
        <br>
        <button class="mystic-btn" onclick="simulateGameEnd()">⚡ 测定天命轨变</button>
    </div>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="mystic-card">
        <button class="close-btn" onclick="closeModal()">×</button>
        
        <h2 class="card-title" id="fate_rank">SSR 阶</h2>
        <p class="card-subtitle" id="fate_title">破晓之神 · 天命觉醒</p>

        <div class="stat-row">
            <span class="stat-label">✦ 灵魂主控命牌 (塔罗)</span>
            <span class="stat-val" id="res_tarot" style="color: #ffaa00;">命运之轮</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">✦ 灵视精度 (记忆力)</span>
            <span class="stat-val" id="res_memory">0 pt</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">✦ 瞬动神速 (反应力)</span>
            <span class="stat-val" id="res_reaction">0 ms</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">✦ 神圣律动 (节奏感)</span>
            <span class="stat-val" id="res_rhythm">0 %</span>
        </div>

        <div id="qrcode-container"></div>
        <p style="font-size: 0.75rem; color: #888; margin: 0; letter-spacing: 1px;">
            请将此印记展示给资讯社工作人员核销礼品
        </p>
    </div>
</div>

<script>
    // ==================== 【🔮 首页云端动态天数与库存实时同步系统】 ====================
    const SUPABASE_URL = "https://eglmalfktjrrvkiolqrd.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_H8C9O523vQl89-h-Y1Mj_A_7DjNCiQy"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentDayStockId = "day1"; // 动态识别的结果将保存在这里
    let globalQrcode = null;

    // 页面加载完全自动初始化
    window.onload = function() {
        initSmartStockSystem();
    };

    async function initSmartStockSystem() {
        // 1. 先去云端查一下配置表，今天大本营开启的是第几天（day1 还是 day2）
        const { data: configData, error: configErr } = await _supabase
            .from('config')
            .select('value')
            .eq('id', 'current_active_day')
            .single();

        if (!configErr && configData) {
            currentDayStockId = configData.value; // 🎯 成功识别天数指令！
        }

        // 2. 知道了是哪一天后，立刻拉取这一天的最新库存
        await fetchCurrentStock();

        // 3. 开启全自动化实时双轨监听（不管是后台改了天数，还是staff扣了库存，全实时推送到界面！）
        _supabase
            .channel('index-global-watch')
            // 轨A：监听库存变动
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                if (payload.new.id === currentDayStockId) {
                    updateIndexStockDOM(payload.new.count);
                }
            })
            // 轨B：监听天数开关变动（如果你在控制台把day1双击改成day2，来宾端无需刷新秒切）
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'config' }, async (payload) => {
                if (payload.new.id === 'current_active_day') {
                    currentDayStockId = payload.new.value; 
                    await fetchCurrentStock(); // 自动拉取新天数的库存
                }
            })
            .subscribe();
    }

    // 从云端拉取指定库存
    async function fetchCurrentStock() {
        const { data, error } = await _supabase
            .from('stocks')
            .select('count')
            .eq('id', currentDayStockId)
            .single();
            
        if (!error && data) {
            updateIndexStockDOM(data.count);
        }
    }

    // 渲染更新前端界面数字
    function updateIndexStockDOM(count) {
        const stockEl = document.getElementById('index-day-stock');
        if (stockEl) {
            if (count <= 0) {
                stockEl.innerText = "已罄";
                stockEl.style.color = "#666";
            } else {
                stockEl.innerText = count;
                stockEl.style.color = "#ff4a4a";
            }
        }
    }

    // ==================== 【🎮 游戏结束：逆向运算生成天命报告逻辑】 ====================
    
    // 华文塔罗权威数据库
    const tarotDatabase = [
        { name: "愚者 (The Fool)" }, { name: "魔术师 (The Magician)" }, { name: "女祭司 (The High Priestess)" },
        { name: "皇后 (The Empress)" }, { name: "皇帝 (The Emperor)" }, { name: "教皇 (The Hierophant)" },
        { name: "恋人 (The Lovers)" }, { name: "战车 (The Chariot)" }, { name: "力量 (Strength)" },
        { name: "隐者 (The Hermit)" }, { name: "命运之轮 (The Wheel of Fortune)" }, { name: "正义 (Justice)" },
        { name: "倒吊人 (The Hanged Man)" }, { name: "死神 (Death)" }, { name: "节制 (Temperance)" },
        { name: "恶魔 (The Devil)" }, { name: "塔 (The Tower)" }, { name: "星星 (The Star)" },
        { name: "月亮 (The Moon)" }, { name: "太阳 (The Sun)" }, { name: "审判 (Judgement)" },
        { name: "世界 (The World)" },
        { name: "权杖 Ace" }, { name: "权杖二" }, { name: "权杖三" }, { name: "权杖四" }, { name: "权杖五" },
        { name: "权杖六" }, { name: "权杖七" }, { name: "权杖八" }, { name: "权杖九" }, { name: "权杖十" },
        { name: "权杖侍从" }, { name: "权杖骑士" }, { name: "权杖皇后" }, { name: "权杖国王" },
        { name: "圣杯 Ace" }, { name: "圣杯二" }, { name: "圣杯三" }, { name: "圣杯四" }, { name: "圣杯五" },
        { name: "圣杯六" }, { name: "圣杯七" }, { name: "圣杯八" }, { name: "圣杯九" }, { name: "圣杯十" },
        { name: "圣杯侍从" }, { name: "圣杯骑士" }, { name: "圣杯皇后" }, { name: "圣杯国王" },
        { name: "宝剑 Ace" }, { name: "宝剑二" }, { name: "宝剑三" }, { name: "宝剑四" }, { name: "宝剑五" },
        { name: "宝剑六" }, { name: "宝剑七" }, { name: "宝剑八" }, { name: "宝剑九" }, { name: "宝剑十" },
        { name: "宝剑侍从" }, { name: "宝剑骑士" }, { name: "宝剑皇后" }, { name: "宝剑国王" },
        { name: "钱币 Ace" }, { name: "钱币二" }, { name: "钱币三" }, { name: "钱币四" }, { name: "钱币五" },
        { name: "钱币六" }, { name: "钱币七" }, { name: "钱币八" }, { name: "钱币九" }, { name: "钱币十" },
        { name: "钱币侍从" }, { name: "钱币骑士" }, { name: "钱币皇后" }, { name: "钱币国王" }
    ];

    function simulateGameEnd() {
        // 模拟生成玩家测试成绩
        const scoreMem = Math.floor(Math.random() * 40) + 60;   // 60~100 pt
        const scoreReact = Math.floor(Math.random() * 150) + 180; // 180~330 ms
        const scoreRhythm = Math.floor(Math.random() * 30) + 70;  // 70~100 %

        // 根据实力公式计算最终段位权重
        const totalWeight = scoreMem + (400 - scoreReact) + scoreRhythm;
        let rank = "B";
        let rankTitle = "迷途观测者 · 天命混沌";
        
        if (totalWeight >= 520) {
            rank = "SSR";
            rankTitle = "破晓之神 · 天命觉醒";
        } else if (totalWeight >= 460) {
            rank = "SR";
            rankTitle = "星轨编织者 · 气运加身";
        } else if (totalWeight >= 380) {
            rank = "A";
            rankTitle = "密教执行官 · 运势渐隆";
        }

        // 用数据指纹动态生成塔罗牌索引索引 (0 - 77)
        const tarotIndex = (scoreMem * 3 + scoreReact + scoreRhythm * 2) % tarotDatabase.length;
        const matchedTarotName = tarotDatabase[tarotIndex].name;

        // 渲染弹窗报告数据
        document.getElementById('fate_rank').innerText = rank + " 阶";
        document.getElementById('fate_title').innerText = rankTitle;
        document.getElementById('res_memory').innerText = scoreMem + " pt";
        document.getElementById('res_reaction').innerText = scoreReact + " ms";
        document.getElementById('res_rhythm').innerText = scoreRhythm + " %";
        
        const tarotEl = document.getElementById('res_tarot');
        tarotEl.innerText = matchedTarotName;

        // 根据四大元素为卡面文字渲染特定流光颜色
        if (matchedTarotName.includes("权杖")) tarotEl.style.color = "#ff5555";
        else if (matchedTarotName.includes("圣杯")) tarotEl.style.color = "#55aaff";
        else if (matchedTarotName.includes("宝剑")) tarotEl.style.color = "#55ffaa";
        else if (matchedTarotName.includes("钱币")) tarotEl.style.color = "#e67e22";
        else tarotEl.style.color = "var(--ancient-gold)";

        // 呈现结果面板
        document.getElementById('resultModal').style.display = 'flex';

        // 🎯 【重磅：生成带有完整因果参数的线上联动二维码】
        const baseUrl = "https://pf-itclub-codex-2026.vercel.app/staff.html";
        const qrUrl = `${baseUrl}?r=${encodeURIComponent(rank)}&t=${tarotIndex}&m=${scoreMem}&re=${scoreReact}&rh=${scoreRhythm}`;

        const qrContainer = document.getElementById('qrcode-container');
        qrContainer.innerHTML = ""; // 清空上一次的印记

        // 调用 QRCode 插件渲染
        new QRCode(qrContainer, {
            text: qrUrl,
            width: 140,
            height: 140,
            colorDark : "#0f0f14",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
    }
</script>

</body>
</html>
