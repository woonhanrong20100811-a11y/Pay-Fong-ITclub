<!DOCTYPE html>

            padding: 0;

            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;

            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            box-sizing: border-box;
            border-left: 2px solid rgba(194, 159, 100, 0.2);
            border-right: 2px solid rgba(194, 159, 100, 0.2);
            position: relative;

            text-align: center;

            margin: 0;
            text-shadow: 0 0 15px rgba(194, 159, 100, 0.3);

        .subtitle {
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 4px;
            color: var(--ancient-gold);
            opacity: 0.7;
            margin-bottom: 30px;
        }

            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(194, 159, 100, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        
        .stock-display-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .stock-item {
            font-size: 0.85rem;
            color: #bbb;
        }
        
        .stock-item span {
            font-weight: bold;
            color: #fff;
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .step {
            display: none; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .step.active { 
            display: block !important; 
            opacity: 1 !important;
        }

        .input-ritual-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(194, 159, 100, 0.3);
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--ancient-gold);
            margin-bottom: 10px;
            font-weight: bold;
        }

            background: transparent;
            border: none;
            border-bottom: 1px solid var(--ancient-gold);

            padding: 8px 5px;
            font-size: 1.05rem;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

            border-bottom: 2px solid white;
            background: rgba(194, 159, 100, 0.05);
        }

        .tarot-numbers {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .tarot-numbers input {
            text-align: center;
            font-size: 1.3rem;
            color: var(--ancient-gold);
        }

            max-width: 280px;
            margin: 15px auto 0 auto;
            padding: 12px 10px;
            background: var(--blood-dark);
            color: var(--ancient-gold);
            border: 1px solid var(--ancient-gold);

            font-size: 1.25rem;
            letter-spacing: 2px;

            border-radius: 4px;

        try {
            const { data: configData, error: configErr } = await _supabase
                .from('config')
                .select('value')
                .eq('id', 'current_active_day')
                .single();

            if (!configErr && configData) {
                currentActiveDayId = configData.value; 
            }

            await fetchStockForPlayers();

            _supabase
                .channel('player-global-watch')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stocks' }, payload => {
                    globalStocksData[payload.new.id] = payload.new.count;
                    renderStockUI();
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'config' }, async (payload) => {
                    if (payload.new.id === 'current_active_day') {
                        currentActiveDayId = payload.new.value; 
                        renderStockUI(); 
                    }
                })
                .subscribe();
        } catch (err) {
            console.error("云端实时同步系统初始化异常:", err);
        }
    }

        const { data, error } = await _supabase.from('stocks').select('*');

            data.forEach(item => {
                globalStocksData[item.id] = item.count;
            });
            renderStockUI();
        }

    // ==================== 【流程状态导向引擎】 ====================
    function nextStep(n) {
        const allSteps = document.querySelectorAll('.step');
        for(let i=0; i<allSteps.length; i++) {
            allSteps[i].classList.remove('active');
        }
        const target = document.getElementById('step' + n);
        if(target) {
            target.classList.add('active');
        }
        window.scrollTo(0, 0);
    }

    // ==================== 【日期严苛校验系统】 ====================
    function parseAndValidateDate(dateString) {
        if (!dateString) return null;
        let year = NaN, month = NaN, day = NaN;

        if (/^\d{8}$/.test(dateString)) {
            year = parseInt(dateString.substring(0, 4), 10);
            month = parseInt(dateString.substring(4, 6), 10);
            day = parseInt(dateString.substring(6, 8), 10);
        } else {
            const cleanStr = dateString.replace(/[\/\.\s]/g, '-');
            const parts = cleanStr.split('-');
            if (parts.length >= 3) {
                year = parseInt(parts[0], 10);
                month = parseInt(parts[1], 10);
                day = parseInt(parts[2], 10);
            } else {
                const d = new Date(cleanStr);
                if (!isNaN(d.getTime())) {
                    year = d.getFullYear();
                    month = d.getMonth() + 1;
                    day = d.getDate();
                }
            }
        }

        if (isNaN(year) || isNaN(month) || isNaN(day)) return null;
        if (month < 1 || month > 12 || day < 1 || year < 1800 || year > 2100) return null;

        const monthDays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        
        if (month === 2) {
            const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            const maxFebruaryDays = isLeap ? 29 : 28;
            if (day > maxFebruaryDays) return null;
        } else {
            if (day > monthDays[month - 1]) return null;
        }

        return { year, month, day };
    }

    function getConstellation(dateString) {
        const parsedDate = parseAndValidateDate(dateString);
        if (!parsedDate) return "未知星座";
        
        const month = parsedDate.month;
        const day = parsedDate.day;
        
        const dates = [20, 19, 21, 20, 21, 22, 23, 23, 23, 24, 23, 22];
        const consts = ["摩羯座", "水瓶座", "双鱼座", "白羊座", "金牛座", "双子座", "巨蟹座", "狮子座", "处女座", "天秤座", "天蝎座", "射手座"];
        return day < dates[month - 1] ? consts[month - 1] : consts[month % 12];
    }

    // ==================== 【核心修复：一键自动纯净化生成并下载 PDF 模块】 ====================
    function downloadPurePDF() {
        const btn = document.getElementById('download-pdf-btn');
        btn.innerText = "✦ 法典拓印中... ✦";
        btn.disabled = true;

        // 1. 克隆现有的报告卡片
        const originalCard = document.getElementById('main_report_card');
        const cloneCard = originalCard.cloneNode(true);

        // 2. 纯净化处理：完全移除核销二维码区块
        const qrcodeBox = cloneCard.querySelector('.qrcode-box');
        if (qrcodeBox) {
            qrcodeBox.remove();
        }

        // 3. 核心修复：创建一个渲染可见但通过隐形图层隐藏的容器包裹它
        // 避开 display: none 和极端偏移，改用 opacity/z-index 覆盖，完美解决画布空白
        const pdfWrapper = document.createElement('div');
        pdfWrapper.style.position = 'fixed';
        pdfWrapper.style.zIndex = '-9999'; 
        pdfWrapper.style.opacity = '0';
        pdfWrapper.style.top = '0';
        pdfWrapper.style.left = '0';
        pdfWrapper.style.width = '440px'; 
        pdfWrapper.style.padding = '20px';
        pdfWrapper.style.boxSizing = 'border-box';
        pdfWrapper.style.background = '#0a0a0c'; // 暗色调同步
        
        pdfWrapper.appendChild(cloneCard);
        document.body.appendChild(pdfWrapper);

        // 4. 配置 html2pdf 高级属性
        const options = {
            margin:       10,
            filename:     `灵魂法典_${currentRankGlobal}_报告.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 2,           // 2倍抗锯齿高清渲染
                useCORS: true,      // 允许跨域图片加载
                backgroundColor: '#0a0a0c' 
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // 5. 执行异步后台捕获并下载
        html2pdf().set(options).from(pdfWrapper).save().then(() => {
            btn.innerText = "✦ 拓印留存 (自动下载PDF) ✦";
            btn.disabled = false;
            pdfWrapper.remove(); // 及时销毁临时节点
        }).catch(err => {
            alert("PDF 拓印生成失败: " + err.message);
            btn.innerText = "✦ 拓印留存 (自动下载PDF) ✦";
            btn.disabled = false;
            if(pdfWrapper) pdfWrapper.remove();
        });
    }
